<div class="list-container">
    <div class="list-item">
        <div class="item-icon">
            <img src="https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/theopennetwork/info/logo.png" alt="TON">
        </div>
        <div class="item-info">
            <div class="item-title">TON</div>
            <div class="item-sub">$5.24</div>
        </div>
        <div style="text-align: right;">
            <div class="item-title" id="tonCount">0</div>
            <div class="item-sub" id="tonFiat">$0</div>
        </div>
    </div>
    <div class="list-item">
        <div class="item-icon">
            <img src="https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/ethereum/assets/0xdAC17F958D2ee523a2206206994597C13D831ec7/logo.png" alt="USDT">
        </div>
        <div class="item-info">
            <div class="item-title">USDT</div>
            <div class="item-sub">Tether</div>
        </div>
        <div style="text-align: right;">
            <div class="item-title" id="usdtCount">0</div>
            <div class="item-sub" id="usdtFiat">$0</div>
        </div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    function triggerHaptic(style) {
        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred(style);
    }

    window.switchTab = function(id, el) {
        triggerHaptic('light');
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        const target = document.getElementById('tab-' + id);
        if (target) target.classList.add('active');
        el.classList.add('active');
    };

    window.openModal = function() {
        triggerHaptic('medium');
        document.getElementById('modal-info').classList.add('show');
    };

    window.closeModal = function() {
        document.getElementById('modal-info').classList.remove('show');
    };

    // УЛУЧШЕННАЯ ФУНКЦИЯ РАСЧЕТА БАЛАНСА (25/75)
    window.editBalance = function() {
        triggerHaptic('selection_change');
        const val = prompt("Enter total balance ($):", "1000");
        
        if (val !== null && !isNaN(val)) {
            const total = parseFloat(val);
            const tonPrice = 5.24;

            // Распределение
            const tonFiatValue = total * 0.25;
            const usdtFiatValue = total * 0.75;
            const tonCoins = tonFiatValue / tonPrice;

            // Обновление главного текста
            document.getElementById('mainBalance').innerText = "$" + total.toLocaleString('ru-RU');

            // Обновление строк TON
            document.getElementById('tonCount').innerText = tonCoins.toFixed(2);
            document.getElementById('tonFiat').innerText = "$" + tonFiatValue.toLocaleString('ru-RU');

            // Обновление строк USDT
            document.getElementById('usdtCount').innerText = usdtFiatValue.toLocaleString('ru-RU');
            document.getElementById('usdtFiat').innerText = "$" + usdtFiatValue.toLocaleString('ru-RU');
            
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        }
    };
</script>
